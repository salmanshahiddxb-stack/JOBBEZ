name: JOBBEZ Daily Multi-Platform Updater

on:
  schedule:
    - cron: '0 0 * * *' # 🟢 Runs automatically every single day at midnight!
  workflow_dispatch: # Keeps your manual test button active

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Copy project files
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install required modules
      run: |
        pip install requests

    - name: Execute Scraper Script
      run: python scraper.py

    - name: Save new jobs to GitHub repository
      run: |
        git config --global user.name "JOBBEZ Automation Bot"
        git config --global user.email "bot@github.com"
        git add jobs.json
        git commit -m "Daily Sync: Fresh Top 5 Platform Jobs Updated" || exit 0
        git push
